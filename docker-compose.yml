services:
  postgres:
    image: postgres:16-alpine
    container_name: plotwise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plotwise
    ports:
      - "5432:5432"
    volumes:
      - plotwise_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plotwise"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  plotwise_postgres_data:
