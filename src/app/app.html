<div class="planner-workspace">
  <header class="topbar">
    <div class="topbar__title-wrap">
      <h1 class="topbar__title">Plotwise Planner</h1>
      <p class="topbar__subtitle">{{ project().name }} • Zone {{ project().climateZone }}</p>
    </div>

    <div class="topbar__controls">
      <label class="control-inline" for="project-select">Project</label>
      <select
        id="project-select"
        class="form-select form-select-sm"
        [value]="project().id"
        (change)="setActiveProject(($any($event.target)).value)"
      >
        @for (item of (showArchivedProjects() ? projects() : visibleProjects()); track item.id) {
          <option [value]="item.id">{{ item.name }}{{ item.archivedAtIso ? ' (archived)' : '' }}</option>
        }
      </select>

      <label class="control-inline control-inline--checkbox">
        <input type="checkbox" [checked]="showArchivedProjects()" (change)="setShowArchivedProjects(($any($event.target)).checked)" />
        Show Archived
      </label>

      <label class="control-inline" for="season-select">Season</label>
      <select
        id="season-select"
        class="form-select form-select-sm"
        [value]="project().season"
        (change)="setSeason(($any($event.target)).value)"
      >
        <option value="spring">Spring</option>
        <option value="summer">Summer</option>
        <option value="fall">Fall</option>
        <option value="winter">Winter</option>
      </select>

      <button type="button" class="btn btn-sm btn-outline-success" (click)="saveProject()">Save</button>
      <button type="button" class="btn btn-sm btn-outline-secondary" (click)="reloadProjects()">Reload</button>
      <button type="button" class="btn btn-sm btn-outline-primary" (click)="createProject()">New Project</button>
      <button type="button" class="btn btn-sm btn-outline-primary" (click)="duplicateProject()">Duplicate Project</button>
      @if (!project().archivedAtIso) {
        <button type="button" class="btn btn-sm btn-outline-warning" (click)="archiveProject()">Archive Project</button>
      } @else {
        <button type="button" class="btn btn-sm btn-outline-warning" (click)="unarchiveProject(project().id)">Unarchive Project</button>
      }
      <button type="button" class="btn btn-sm btn-outline-danger" [disabled]="projects().length <= 1" (click)="deleteProject()">Delete Project</button>
    </div>
  </header>

  <div class="shell-body">
    <router-outlet></router-outlet>
  </div>
</div>
